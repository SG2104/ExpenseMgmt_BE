version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: expense-mgmt_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - expense-mgmt_data:/var/lib/postgresql/data

volumes:
  expense-mgmt_data:
